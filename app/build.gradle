plugins {
    id 'com.android.application'
}

android {
    namespace 'com.professional.heavyapp'
    compileSdk 34

    defaultConfig {
        applicationId "com.professional.heavyapp" // यह आपका पैकेज नेम है
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
